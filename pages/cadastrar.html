<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar enquete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link href="style.css" rel="stylesheet" />
    <link href="forms.css" rel="stylesheet" />

    <script>
        const carregar = async () => {
            console.log("chamou o carregar...");            
            const id = location.search.substring(4,5);
            if (!id) return;

            const response = await fetch(`http://localhost:3000/enquetes/${id}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                }
            });
            const enquetes = await response.json();
            console.log(enquetes);

            document.getElementById('id').value = enquetes.ID;
            document.getElementById('titulo').value = enquetes.NOME;
            document.getElementById('desc').value = enquetes.DESCR;
            document.getElementById('dataInicio').value = enquetes.DATAINICIO;
            document.getElementById('dataTermino').value = enquetes.DATATERMINO;
            document.getElementById('opt1').value = enquetes.opt1;
            document.getElementById('opt2').value = enquetes.opt2;
            document.getElementById('opt3').value = enquetes.opt3;
        }

        const salvar = async () => {
            const id = document.getElementById('id').value;
            const nome = document.getElementById('titulo').value;
            const DATAINICIO = document.getElementById('dataInicio').value;
            const DATATERMINO = document.getElementById('dataTermino').value;
            const DESC = document.getElementById('desc').value;
            const opt1 = document.getElementById('opt1').value;
            const opt2 = document.getElementById('opt2').value;
            const opt3 = document.getElementById('opt3').value;

            if (!nome || !DATAINICIO || !DATATERMINO || !opt1 || !opt2) {
                document.getElementById('campoObrigatorio').style.display = 'block';
                return;
            }

            const DATAINICIO_CLEAN = DATAINICIO.split('T')[0];
            const DATATERMINO_CLEAN = DATATERMINO.split('T')[0]; 
            console.log(DATAINICIO_CLEAN, DATATERMINO_CLEAN);

            const currentDate = new Date().toLocaleDateString('en-CA');
            if(DATATERMINO_CLEAN < currentDate) {
                console.log("data no passado");
                alert("Você não pode finalizar uma enquete no passado.");
                return;
            } else if(DATAINICIO_CLEAN > DATATERMINO_CLEAN) {
                console.log("data depois da data de termino");
                alert("Você não pode começar uma enquete após que ela conclua.");
                return;
            }
            console.log(id, nome, DATAINICIO, DATATERMINO, DESC, opt1, opt2, opt3);

            const data = {
                NOME: nome,
                DATAINICIO: DATAINICIO_CLEAN,
                DATATERMINO: DATATERMINO_CLEAN,
                DESCR: DESC,
                opt1: opt1,
                opt2: opt2,
                opt3: opt3
            };

            try {
                let res;
                if (id) {
                    res = await fetch(`http://localhost:3000/enquetes/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json"},
                        body: JSON.stringify(data),
                    });
                } else {
                    res = await fetch(`http://localhost:3000/enquetes`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json"},
                        body: JSON.stringify(data),
                    });
                }

                const result = await res.json();
                console.log(result);

                if (res.ok) {
                    alert(id ? "Enquete atualizada com sucesso!" : "Cadastro de enquete realizado com sucesso!");
                    window.location.href = "/";
                } else {
                    alert(`Erro: ${result.error}`);
                }
            } catch (error) {
                console.error('Erro ao enviar os dados:', error);
                alert("Erro ao salvar a enquete.");
            }
        };

        carregar();
    </script>
</head>

<body>
    <div class="container">
        <h2> Adicionar enquete</h2>
        <br>
        <form action="/cadastrar" method="post" enctype="multipart/form-data">
            <input type="hidden" id="id" />
            <div class="mb-3">
                <label for="titulo" class="form-label">Título *</label>
                <input type="text" class="form-control" id="titulo">
            </div>
            <div class="mb-3">
                <label for="desc" class="form-label">Descrição</label>
                <textarea rows="4" cols="50" class="form-control" id="desc"></textarea>
            </div>
            <div class="mb-3">
                <label for="titulo" class="form-label">Opção 1 *</label>
                <input type="text" class="form-control" id="opt1">
            </div>
            <div class="mb-3">
                <label for="titulo" class="form-label">Opção 2 *</label>
                <input type="text" class="form-control" id="opt2">
            </div>
            <div class="mb-3">
                <label for="titulo" class="form-label">Opção 3</label>
                <input type="text" class="form-control" id="opt3">
            </div>
            <div class="mb-3">
                <label for="dataInicio" class="form-label">Data de início *</label>
                <input type="date" class="form-control" id="dataInicio">
            </div>
            <div class="mb-3">
                <label for="dataFim" class="form-label">Data de término *</label>
                <input type="date" class="form-control" id="dataTermino">
            </div>
            <button onclick="salvar();" type="button" class="btn btn-primary">Salvar</button>
        </form>
        <label id="campoObrigatorio" class="error-label">Os campos são obrigatórios.</label>
        <br/>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
