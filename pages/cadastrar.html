<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar enquete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link href="style.css" rel="stylesheet" />

    <script>
        const carregar = async () => {
            console.log("chamou o carregar...");            
            const id = location.search.substring(4,5);
            if (!id) return;

            const response = await fetch(`http://localhost:3000/enquetes/${id}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                }
            });
            const enquetes = await response.json();
            console.log(enquetes);

            document.getElementById('id').value = enquetes.ID;
            document.getElementById('titulo').value = enquetes.NOME;
            document.getElementById('dataInicio').value = enquetes.DATAINICIO;
            document.getElementById('dataTermino').value = enquetes.DATATERMINO;
        }

        const salvar = async () => {
            const id = document.getElementById('id').value;
            const nome = document.getElementById('titulo').value;
            const DATAINICIO = document.getElementById('dataInicio').value;
            const DATATERMINO = document.getElementById('dataTermino').value;

            if (!nome || !DATAINICIO || !DATATERMINO) {
                document.getElementById('campoObrigatorio').style.display = 'block';
                return;
            }

            const formData = new FormData();
            formData.append('ID', id);
            formData.append('NOME', nome);
            formData.append('DATAINICIO', DATAINICIO);
            formData.append('DATATERMINO', DATATERMINO);

            for (let pair of formData.entries()) {
                console.log(pair[0]+ ': ' + pair[1]);
            }

            try {
                let res;
                if (id) {
                    res = await fetch(`http://localhost:3000/enquetes/${id}`, {
                        method: "PUT",
                        body: formData,
                    });
                } else {
                    res = await fetch(`http://localhost:3000/enquetes`, {
                        method: "POST",
                        body: formData,
                    });
                }

                const result = await res.json();
                console.log(result);

                if (res.ok) {
                    alert(id ? "Enquete atualizada com sucesso!" : "Cadastro de enquete realizado com sucesso!");
                    window.location.href = "lista-enquetes.html";
                } else {
                    alert(`Erro: ${result.error}`);
                }
            } catch (error) {
                console.error('Erro ao enviar os dados:', error);
                alert("Erro ao salvar a enquete.");
            }
        };

        carregar();
    </script>
</head>

<body>
    <div class="container" style="height: 300px;">
        <h2> Adicionar enquete</h2>
        <br>
        <form action="/cadastrarEnquete" method="post" enctype="multipart/form-data">
            <input type="hidden" id="id" />
            <div class="mb-3">
                <label for="nome" class="form-label">Título</label>
                <input type="text" class="form-control" id="nome">
            </div>
            <div class="mb-3">
                <label for="dataInicio" class="form-label">Data de início</label>
                <input type="date" class="form-control" id="dataInicio">
            </div>
            <div class="mb-3">
                <label for="dataFim" class="form-label">Data de término</label>
                <input type="date" class="form-control" id="dataFim">
            </div>
            <button onclick="salvar();" type="button" class="btn btn-primary">Salvar</button>
        </form>
        <label id="campoObrigatorio" class="error-label">Os campos são obrigatórios.</label>
        <br/>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
