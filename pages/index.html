<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
      <script>
      var id = localStorage.getItem('id');
      if (!id) {
        alert('Você precisa se autenticar na aplicação!');
        location.href = 'login.html';
      }
    </script>
    <script>
      const carregar = (id) => {
                  console.log("entrou na função carregar")
                  console.log(id);
                  location.href = 'cadastrar.html?id='+id;
        }

      const votar = (id) => {
                  console.log("entrou na função votar")
                  console.log(id);
                  location.href = 'vote.html?id='+id;
        }

      const deletar = async(id) => {
        if(!window.confirm("Deseja excluir?")) {return;} else {
          console.log("chamou o excluir");
          console.log(id);

          const response = await fetch(`http://localhost:3000/enquetes/${id}`, {
              method: "DELETE",
              headers: {
                  "Content-Type": "application/json",
              },
          });

          const result = await response.body;
          console.log(result);

          if (response.ok) {
            alert("Enquete deletada com sucesso!");
            window.location.href="index.html";
          } else {
            const error = await response.json();
            alert(`Erro: ${error.message}`);
          }
        }
      }
    </script>

  </head>
  <body style="background-color: #272626;">
      <div class="container" style="width: 100%; overflow:scroll; overflow-x: hidden; overflow-y: auto;">
      <div class="row">
        <div class="col-8">
        </div>
        <table id="tabelaEnquetes" class="table table-striped table-hover table-dark">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Título</th>
              <th scope="col">Data de Início</th>
              <th scope="col">Data de Término</th>
              <th scope="col"></th>
              <th scope="col"></th>
              <th scope="col"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button class="btn btn-secondary" onclick="location.href= 'cadastrar.html'" style="padding: 0">Adicionar enquete</button>
      </div>
      </div>

      <script>
        const listar = async () => {
          console.log("chamou a função listar");

          const response = await fetch(`http://localhost:3000/enquetes`, {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
            },
          });

          enquetes = await response.json();
          const tabelaEnquetes = document.getElementById("tabelaEnquetes");

          enquetes.map((enquete, indice) => {
            var row = tabelaEnquetes.insertRow(indice + 1);
            var cell1 = row.insertCell(0);
            var cell2 = row.insertCell(1);
            var cell3 = row.insertCell(2);
            var cell4 = row.insertCell(3);
            var cell5 = row.insertCell(4);
            var cell6 = row.insertCell(5);
            var cell7 = row.insertCell(6);

            cell1.innerHTML = enquete.ID;
            cell2.innerHTML = enquete.NOME;
            cell3.innerHTML = enquete.DATAINICIO;
            cell4.innerHTML = enquete.DATATERMINO;
            cell5.innerHTML = '<button onclick="carregar('+enquete.ID+')" class="btn btn-primary">Editar</editar>';
            cell6.innerHTML = '<button onclick="votar('+enquete.ID+')" class="btn btn-primary">Votar</editar>';
            cell7.innerHTML = '<button onclick="deletar('+enquete.ID+')" class="btn btn-danger">Excluir</editar>';
        });
    };
    listar();
    
      </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
