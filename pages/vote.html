<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar enquete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" />
    <link href="vote.css" rel="stylesheet" />
    <script>
      var userID = localStorage.getItem('id');
      if (!userID) {
        alert('Você precisa se autenticar na aplicação!');
        location.href = 'login.html';
      }
    </script>
    <script>
        const carregar = async () => {
            console.log("chamou o carregar...");            
            const id = location.search.substring(4,5);
            if (!id) return;

            const response = await fetch(`http://localhost:3000/enquetes/${id}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                }
            });
            const enquetes = await response.json();
            console.log(enquetes);

            document.getElementById('titulo').textContent = enquetes.NOME;
            document.getElementById('desc').textContent = enquetes.DESCR;
            document.getElementById('opt1').textContent = enquetes.opt1;
            document.getElementById('opt2').textContent = enquetes.opt2;
            document.getElementById('opt3').textContent = enquetes.opt3;

            const currentDate = new Date().toLocaleDateString('en-CA');
            console.log(enquetes.DATATERMINO, currentDate);
            if(enquetes.DATATERMINO < currentDate) {
                console.log("enquete acabou");
                document.getElementById('opt1').disabled = true;
                document.getElementById('opt2').disabled = true;
                document.getElementById('opt3').disabled = true;
            }
        }

        const carregarVotos = async () => {
            const id = location.search.substring(4,5);

            const response = await fetch(`http://localhost:3000/votos/${id}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                }
            });
            const votos = await response.json();
            console.log(votos);

            document.getElementById('opt1Text').textContent = 0;
            document.getElementById('opt2Text').textContent = 0;
            document.getElementById('opt3Text').textContent = 0;

            votos.forEach(voto => {
                const id = `opt${voto.opcao}Text`;
                const elemento = document.getElementById(id);

                if (elemento) {
                elemento.textContent = voto.total;
                }
            });
        }

        const displayDatas = async () => {
            const id = location.search.substring(4,5);

            const response = await fetch(`http://localhost:3000/enquetes/${id}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                }
            });
            const enquetes = await response.json();
            console.log(enquetes);

            const dataInStr = enquetes.DATAINICIO;
            const [yearIn, monthIn, dayIn] = dataInStr.split('-');

            const dataTrStr = enquetes.DATATERMINO;
            const [yearTr, monthTr, dayTr] = dataTrStr.split('-');

            const meses = [
            "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
            "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];

            const DATAINICIO_FORMATADA = `${dayIn} de ${meses[parseInt(monthIn) - 1]} de ${yearIn}`;
            const DATATERMINO_FORMATADA = `${dayTr} de ${meses[parseInt(monthTr) - 1]} de ${yearTr}`;
            document.getElementById('dataInicio').textContent = DATAINICIO_FORMATADA;
            document.getElementById('dataTermino').textContent = DATATERMINO_FORMATADA;
        }

        const votar = async (opcao) => {
            console.log("chamou o votar");

            const enqueteID = location.search.substring(4,5);

            console.log("userID:", userID);
            console.log("enqueteID:", enqueteID);

            const data = {userID, enqueteID, opcao};

            try {
                const response = await fetch(`http://localhost:3000/votos`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    },
                body: JSON.stringify(data),
                });

                const result = await response.json();
                console.log(result);

                if (response.ok) {
                    alert("Seu voto foi cadastrado com sucesso!");
                } else {
                    alert(`Erro: ${result.error}`);
                }
            } catch (error) {
                console.error('Erro ao enviar os dados:', error);
                alert("Erro ao processar o voto.");
            }

        }

        carregar();
        carregarVotos();
        displayDatas();
        setInterval(carregarVotos, 3000);
    </script>
</head>

<body>
    <div class="container" style="width: 50%;">
        <h1>Você foi convidado(a) para votar em:</h1>
        <h2 id="titulo"> Enquete</h2>
        <p id="desc"></p> 
        <p>Enquete criada em <span id="dataInicio"></p> 
        <p>Data de término: <span id="dataTermino"></p>
        <br/>
        <div class="buttonContainer">
            <div>
                <button onclick="votar(1);" type="button" class="btn btn-primary" id="opt1">Opção 1</button>
                <label id="opt1Text">0</label>
            </div>
            <br>
            <div>
                <button onclick="votar(2);" type="button" class="btn btn-primary" id="opt2">Opção 2</button>
                <label id="opt2Text">0</label>
            </div>
            <br>
            <div>
                <button onclick="votar(3);" type="button" class="btn btn-primary" id="opt3">Opção 3</button>
                <label id="opt3Text">0</label>
            </div>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
