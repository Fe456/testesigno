<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link href="style.css" rel="stylesheet" />
    <link href="forms.css" rel="stylesheet" />
    <script>
        const realizarLogin = async(event) => {
            if (event) event.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const data = {                
                email: email,
                senha: senha,
            };
            console.log(JSON.stringify(data));

            try {
                const response = await fetch(`http://localhost:3000/api/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(data),
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }            
                const result = await response.json();
                console.log(result);

                if (result.length) {
                    console.log("achou o usuário");
                    const usuario = result[0];
                    localStorage.setItem('id', usuario.ID);
                    localStorage.setItem('email', usuario.EMAIL);
                    location.href = 'index.html';
                } else {
                    console.log("não achou o usuário");
                    localStorage.clear();
                    document.getElementById('loginInvalido').style.display = 'block';
                }
            } catch (error) {
                console.error(error);
            }
        }


        function mostrarSenha() {            
            var campoSenha = document.getElementById('senha');

            if (campoSenha.type == 'text') {
                campoSenha.type = 'password';
            } else {
                campoSenha.type = 'text';
            }
        }
    </script>

</head>

<body style="background-color: rgb(39, 38, 38);">
    <div class="containerSmall">
        <h2>Login</h2>
        <br>
        <form>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
            </div>
            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha">
                <input onclick="mostrarSenha()" type="checkbox"> Mostrar senha
            </div>
            <br>
            <button onclick="realizarLogin(event)" type="button" class="btn btn-primary">Login</button>
            <br>
            <a href="cadastrarUser.html">Cadastrar</a>
        </form>
        <label id="loginInvalido" class="error-label">Email ou Senha inválida.</label>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
